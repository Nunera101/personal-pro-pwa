<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b1210">
  <title>Minha Área — Personal Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    :root {
      --bg: #0b1210;
      --surface: #131a17;
      --card: #1b2420;
      --border: #253028;
      --text: #e2ede8;
      --muted: #738d84;
      --brand: #0b6b57;
      --brand-dim: #094e3f;
      --gold: #e7a83e;
      --gold-soft: rgba(231,168,62,.12);
      --danger: #c44949;
      --success: #2d9d78;
      --radius: 10px;
      --t-h1: clamp(1.85rem, 7vw, 2.5rem);
      --t-sub: clamp(0.86rem, 2.8vw, 1rem);
      --t-sub-lh: 1.3;
      --t-section: clamp(1rem, 3.1vw, 1.18rem);
      --t-section-w: 780;
      --t-num-lg: clamp(1.75rem, 7vw, 2.55rem);
      --t-num-md: clamp(1.4rem, 4.8vw, 2rem);
      --t-num-w: 800;
      --t-label: 0.72rem;
      --t-label-w: 800;
    }

    html { scroll-behavior: smooth; }

    input, select, textarea { font-size: max(16px, 1em); }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100dvh;
    }

    /* ── Loading ─────────────────────────────────────── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
    }

    .spinner {
      width: 2.4rem;
      height: 2.4rem;
      border: 3px solid var(--border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ───────────────────────────────────────── */
    #error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
    }

    .error-icon {
      font-size: 2.8rem;
      line-height: 1;
    }

    .error-title {
      font-size: var(--t-section);
      font-weight: var(--t-section-w);
      color: var(--text);
    }

    .error-body {
      font-size: var(--t-sub);
      color: var(--muted);
      max-width: 22rem;
    }

    /* ── App ─────────────────────────────────────────── */
    #app {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 1rem);
    }

    /* ── Header ─────────────────────────────────────── */
    .pa-header {
      background: linear-gradient(160deg, #0e1d19, #0b1210 60%);
      border-bottom: 1px solid var(--border);
      padding: 1.1rem 1rem 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .pa-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      font-size: var(--t-label);
      font-weight: var(--t-label-w);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--brand);
    }

    .pa-brand svg {
      width: 1.1rem;
      height: 1.1rem;
    }

    .pa-profile {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .pa-avatar {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--brand-dim);
      background: var(--card);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--brand);
      overflow: hidden;
    }

    .pa-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .pa-name {
      font-size: var(--t-section);
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .pa-goal {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    /* ── Tabs ────────────────────────────────────────── */
    .pa-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: calc(var(--header-h, 105px));
      z-index: 9;
    }

    .pa-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      padding: 0.65rem 0.5rem;
      font-size: var(--t-label);
      font-weight: var(--t-label-w);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .pa-tab svg { width: 1.15rem; height: 1.15rem; stroke-width: 2; }

    .pa-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ── Sections ────────────────────────────────────── */
    .pa-section { display: none; padding: 1rem; gap: 0.75rem; flex-direction: column; }
    .pa-section.active { display: flex; }

    /* ── Cards ───────────────────────────────────────── */
    .pa-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .pa-card-head {
      padding: 0.75rem 1rem;
      background: linear-gradient(90deg, var(--brand-dim), transparent);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .pa-card-head h3 {
      font-size: var(--t-sub);
      font-weight: 800;
      letter-spacing: 0.01em;
      flex: 1;
    }

    .pa-card-head .badge {
      font-size: var(--t-label);
      font-weight: var(--t-label-w);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      background: var(--gold-soft);
      color: var(--gold);
    }

    .pa-card-body { padding: 0.75rem 1rem; }

    /* ── Exercise list ───────────────────────────────── */
    .ex-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .ex-item {
      display: grid;
      grid-template-columns: 1.6rem 1fr;
      gap: 0.3rem 0.6rem;
      align-items: start;
    }

    .ex-num {
      width: 1.6rem;
      height: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--brand-dim);
      font-size: var(--t-label);
      font-weight: var(--t-label-w);
      color: var(--brand);
      margin-top: 0.1rem;
      flex-shrink: 0;
    }

    .ex-info {}

    .ex-name {
      font-size: var(--t-sub);
      font-weight: 700;
      color: var(--text);
      line-height: var(--t-sub-lh);
    }

    .ex-meta {
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.15rem;
    }

    .ex-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.1rem 0.45rem;
      font-size: var(--t-label);
      font-weight: 600;
    }

    .ex-chip.sets { color: var(--gold); border-color: var(--gold-soft); background: var(--gold-soft); }

    .ex-notes {
      font-size: 0.77rem;
      color: var(--muted);
      margin-top: 0.25rem;
      grid-column: 2;
      font-style: italic;
    }

    /* ── Diet ────────────────────────────────────────── */
    .meal-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .meal-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .meal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      font-size: var(--t-sub);
      font-weight: 700;
    }

    .meal-time { font-size: var(--t-label); color: var(--muted); font-weight: 400; }

    .meal-items { padding: 0.5rem 0.75rem; display: flex; flex-direction: column; gap: 0.3rem; }

    .meal-food {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.82rem;
      gap: 0.5rem;
    }

    .meal-food-name { flex: 1; color: var(--text); }

    .meal-food-qty {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .diet-cals {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--gold);
      background: var(--gold-soft);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }

    /* ── Updates ─────────────────────────────────────── */
    .update-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
    }

    .update-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .update-date { font-size: var(--t-label); color: var(--muted); }

    .update-stats {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.45rem;
    }

    .stat-pill {
      display: flex;
      flex-direction: column;
      gap: 0.05rem;
      padding: 0.35rem 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 4.5rem;
    }

    .stat-label { font-size: var(--t-label); text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: var(--t-label-w); }
    .stat-value { font-size: var(--t-section); font-weight: 800; color: var(--text); }

    .update-notes { font-size: 0.83rem; color: var(--muted); line-height: 1.5; }

    .update-photos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
      margin-top: 0.6rem;
    }

    .update-photo {
      aspect-ratio: 1;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface);
      width: 100%;
    }

    /* ── Sessions ────────────────────────────────────── */
    .session-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .session-icon {
      width: 2.4rem;
      height: 2.4rem;
      border-radius: 50%;
      background: var(--brand-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--brand);
    }

    .session-icon svg { width: 1.1rem; height: 1.1rem; }

    .session-info { flex: 1; min-width: 0; }

    .session-name {
      font-size: var(--t-sub);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }

    /* ── Empty state ─────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }

    /* ── Footer ─────────────────────────────────────── */
    .pa-footer {
      text-align: center;
      padding: 1.5rem 1rem 0.5rem;
      font-size: var(--t-label);
      color: var(--muted);
    }

    .pa-footer strong { color: var(--brand); }

    /* ── Responsive: desktop centering ─────────────── */
    @media (min-width: 520px) {
      #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:.9rem;">Carregando sua área…</p>
</div>

<div id="error" hidden>
  <div class="error-icon">🔗</div>
  <p class="error-title" id="errTitle">Link inválido ou expirado</p>
  <p class="error-body" id="errBody">Este link não é mais válido. Solicite um novo link ao seu personal trainer.</p>
</div>

<div id="app" hidden>
  <header class="pa-header">
    <div class="pa-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 6.5h11M6.5 17.5h11M4 12h16M12 4v16"/>
      </svg>
      Personal Pro
    </div>
    <div class="pa-profile">
      <div class="pa-avatar" id="paAvatar"></div>
      <div>
        <div class="pa-name" id="paName">—</div>
        <div class="pa-goal" id="paGoal"></div>
      </div>
    </div>
  </header>

  <nav class="pa-tabs" role="tablist">
    <button class="pa-tab active" role="tab" data-tab="treino">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 6.5h11M6.5 17.5h11M4 12h16M12 4v16"/>
      </svg>
      Treino
    </button>
    <button class="pa-tab" role="tab" data-tab="dieta">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
      </svg>
      Dieta
    </button>
    <button class="pa-tab" role="tab" data-tab="progresso">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Progresso
    </button>
  </nav>

  <section id="sec-treino" class="pa-section active" role="tabpanel"></section>
  <section id="sec-dieta" class="pa-section" role="tabpanel"></section>
  <section id="sec-progresso" class="pa-section" role="tabpanel"></section>

  <footer class="pa-footer">Área do aluno · <strong>Personal Pro</strong> · Somente leitura</footer>
</div>

<script>
(function () {
  const $ = id => document.getElementById(id);

  function hide(el) { el.hidden = true; }
  function show(el) { el.hidden = false; }

  function formatDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "short", year: "numeric" });
  }

  function formatDuration(sec) {
    if (!sec) return "";
    const m = Math.round(sec / 60);
    return m >= 60 ? `${Math.floor(m / 60)}h ${m % 60}min` : `${m}min`;
  }

  function escHtml(s) {
    return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function initials(name) {
    return String(name || "?").split(" ").slice(0, 2).map(w => w[0]).join("").toUpperCase();
  }

  // ── Tab switching ────────────────────────────────────────────
  function activateTab(name) {
    document.querySelectorAll(".pa-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
    document.querySelectorAll(".pa-section").forEach(s => s.classList.toggle("active", s.id === `sec-${name}`));
  }

  document.querySelectorAll(".pa-tab").forEach(btn => {
    btn.addEventListener("click", () => activateTab(btn.dataset.tab));
  });

  // ── Render workouts ──────────────────────────────────────────
  function renderWorkouts(workouts, exercises) {
    const sec = $("sec-treino");
    if (!workouts.length) {
      sec.innerHTML = `<div class="empty"><div class="empty-icon">🏋️</div>Nenhum treino publicado ainda.</div>`;
      return;
    }
    const exMap = new Map((exercises || []).map(e => [e.id, e]));
    sec.innerHTML = workouts.map(w => {
      const exRows = (w.exercises || [])
        .sort((a, b) => (a.order || 0) - (b.order || 0))
        .map((ex, i) => {
          const exDef = exMap.get(ex.exerciseId) || {};
          const name = escHtml(ex.name || exDef.name || "Exercício");
          const muscle = escHtml(exDef.muscleGroup || "");
          const sets = ex.sets ? `${ex.sets}×${ex.reps || "—"}` : "";
          const weight = ex.weight ? `${ex.weight} kg` : "";
          const rest = ex.rest ? `${ex.rest}s descanso` : "";
          const chips = [
            sets ? `<span class="ex-chip sets">${escHtml(sets)}</span>` : "",
            weight ? `<span class="ex-chip">${escHtml(weight)}</span>` : "",
            muscle ? `<span class="ex-chip">${muscle}</span>` : "",
            rest ? `<span class="ex-chip">${escHtml(rest)}</span>` : ""
          ].filter(Boolean).join("");
          const notes = ex.notes ? `<div class="ex-notes">${escHtml(ex.notes)}</div>` : "";
          return `<div class="ex-item">
            <div class="ex-num">${i + 1}</div>
            <div class="ex-info">
              <div class="ex-name">${name}</div>
              <div class="ex-meta">${chips}</div>
              ${notes}
            </div>
          </div>`;
        }).join("");
      const desc = w.description ? `<p style="font-size:.82rem;color:var(--muted);margin-bottom:.6rem;">${escHtml(w.description)}</p>` : "";
      return `<div class="pa-card">
        <div class="pa-card-head">
          <h3>${escHtml(w.name || "Treino")}</h3>
          <span class="badge">${(w.exercises || []).length} exerc.</span>
        </div>
        <div class="pa-card-body">
          ${desc}
          <div class="ex-list">${exRows || '<p style="color:var(--muted);font-size:.82rem;">Sem exercícios cadastrados.</p>'}</div>
        </div>
      </div>`;
    }).join("");
  }

  // ── Render diets ─────────────────────────────────────────────
  function renderDiets(diets) {
    const sec = $("sec-dieta");
    if (!diets.length) {
      sec.innerHTML = `<div class="empty"><div class="empty-icon">🥗</div>Nenhuma dieta cadastrada ainda.</div>`;
      return;
    }
    sec.innerHTML = diets.map(d => {
      const cals = d.calories ? `<span class="diet-cals">${d.calories} kcal/dia</span>` : "";
      const meals = (d.meals || []).map(m => {
        const items = (m.items || []).map(item => {
          const qty = [item.quantity, item.unit].filter(Boolean).join(" ");
          const cItem = item.calories ? ` · ${item.calories} kcal` : "";
          return `<div class="meal-food">
            <span class="meal-food-name">${escHtml(item.name || "—")}</span>
            <span class="meal-food-qty">${escHtml(qty)}${cItem}</span>
          </div>`;
        }).join("");
        return `<div class="meal-item">
          <div class="meal-head">
            <span>${escHtml(m.name || "Refeição")}</span>
            ${m.time ? `<span class="meal-time">${escHtml(m.time)}</span>` : ""}
          </div>
          <div class="meal-items">${items || '<span style="color:var(--muted);font-size:.8rem;">Sem itens</span>'}</div>
        </div>`;
      }).join("");
      return `<div class="pa-card">
        <div class="pa-card-head">
          <h3>${escHtml(d.name || "Dieta")}</h3>
          ${cals}
        </div>
        <div class="pa-card-body">
          <div class="meal-list">${meals || '<p style="color:var(--muted);font-size:.82rem;">Sem refeições cadastradas.</p>'}</div>
        </div>
      </div>`;
    }).join("");
  }

  // ── Render progress ──────────────────────────────────────────
  function renderProgress(updates, sessions, workouts) {
    const sec = $("sec-progresso");
    const wMap = new Map((workouts || []).map(w => [w.id, w]));
    const updateHtml = updates.length ? updates.map(u => {
      const stats = [
        u.weight ? `<div class="stat-pill"><span class="stat-label">Peso</span><span class="stat-value">${escHtml(String(u.weight))} kg</span></div>` : "",
        u.bodyFat ? `<div class="stat-pill"><span class="stat-label">% Gordura</span><span class="stat-value">${escHtml(String(u.bodyFat))}%</span></div>` : ""
      ].filter(Boolean).join("");
      const photos = (u.photos || []).slice(0, 6).map(p => {
        const src = p.startsWith("/uploads/") ? p : `/uploads/${p}`;
        return `<img class="update-photo" src="${escHtml(src)}" alt="Foto de progresso" loading="lazy">`;
      }).join("");
      return `<div class="update-card">
        <div class="update-head">
          <strong style="font-size:.85rem;">Atualização</strong>
          <span class="update-date">${formatDate(u.createdAt)}</span>
        </div>
        ${stats ? `<div class="update-stats">${stats}</div>` : ""}
        ${u.notes ? `<p class="update-notes">${escHtml(u.notes)}</p>` : ""}
        ${photos ? `<div class="update-photos">${photos}</div>` : ""}
      </div>`;
    }).join("") : "";

    const sessionHtml = sessions.length ? `
      <h4 style="font-size:.8rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:.25rem 0;">Últimos treinos</h4>
      ${sessions.map(s => {
        const w = wMap.get(s.workoutId) || {};
        const dur = formatDuration(s.duration);
        return `<div class="session-card">
          <div class="session-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div class="session-info">
            <div class="session-name">${escHtml(w.name || "Treino")}</div>
            <div class="session-meta">${formatDate(s.finishedAt || s.createdAt)}${dur ? " · " + dur : ""}</div>
          </div>
        </div>`;
      }).join("")}
    ` : "";

    if (!updateHtml && !sessionHtml) {
      sec.innerHTML = `<div class="empty"><div class="empty-icon">📊</div>Nenhum progresso registrado ainda.</div>`;
      return;
    }

    sec.innerHTML = (updateHtml || "") + (sessionHtml || "");
  }

  // ── Boot ─────────────────────────────────────────────────────
  async function boot() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const dest = params.get("dest") || "treino";

    if (!token || token.startsWith("demo")) {
      hide($("loading"));
      $("errTitle").textContent = "Link de demonstração";
      $("errBody").textContent = "Este é um link de demonstração. Solicite o link real ao seu personal trainer.";
      show($("error"));
      return;
    }

    try {
      const res = await fetch("/api/auth/student-area-view", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token })
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || "Link inválido");
      }

      const data = await res.json();
      const { student, workouts, exercises, diets, updates, sessions } = data;

      // Fill header
      const avatarEl = $("paAvatar");
      if (student.photo) {
        const src = student.photo.startsWith("/uploads/") ? student.photo : `/uploads/${student.photo}`;
        avatarEl.innerHTML = `<img src="${escHtml(src)}" alt="Foto do aluno">`;
      } else {
        avatarEl.textContent = initials(student.name);
      }
      $("paName").textContent = student.name || "Aluno";
      if (student.goal) $("paGoal").textContent = student.goal;

      renderWorkouts(workouts, exercises);
      renderDiets(diets);
      renderProgress(updates, sessions, workouts);

      // Activate correct tab from URL param
      const validDest = ["treino", "dieta", "progresso"];
      activateTab(validDest.includes(dest) ? dest : "treino");

      hide($("loading"));
      show($("app"));
    } catch (err) {
      hide($("loading"));
      $("errTitle").textContent = "Link inválido ou expirado";
      $("errBody").textContent = err.message || "Solicite um novo link ao seu personal trainer.";
      show($("error"));
    }
  }

  boot();
})();
</script>
</body>
</html>
